<section id="works" class="fade-in-section section-box">
  <div class="section-bg">
    <nav class="menu-tab">
      <button class="menu-tab-btn active" data-tab="projects">Projects</button>
      <button class="menu-tab-btn" data-tab="publications">Publications</button>
    </nav>
    <div class="menu-content-container">
      <div id="projectsContent" class="menu-tab-content active">
        <div id="worksLoadingState" class="works-loading-state" aria-live="polite" aria-label="Loading projects">
          <div class="works-loading-spinner" aria-hidden="true"></div>
          <span class="basic-text text">Loading works...</span>
        </div>
        <div class="carousel-container">
          <button id="projectPrevBtn" class="carousel-arrow prev" aria-label="Previous project">‹‹</button>
          <div class="carousel-wrapper">
            <div id="projectTrack" class="carousel-track"></div>
          </div>
          <button id="projectNextBtn" class="carousel-arrow next" aria-label="Next project">››</button>
        </div>
        <div id="thumbTrack" class="thumb-track"></div>
      </div>
      <div id="publicationsContent" class="menu-tab-content">
        <ul id="publicationList" class="publication-list"></ul>
      </div>
    </div>
</section>
